name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (example: v1.0.0)"
        required: true
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: "false"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version format
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must follow semantic versioning: vMajor.Minor.Patch"
            exit 1
          fi

      - name: Set package version
        shell: bash
        run: |
          VERSION_NO_V=${{ github.event.inputs.version }}
          VERSION_NO_V=${VERSION_NO_V#v}
          npm version "$VERSION_NO_V" --no-git-tag-version

      - name: Build and package
        run: npm run dist:win

      - name: Create release notes
        id: notes
        shell: bash
        run: |
          node scripts/release-notes.mjs "${{ github.event.inputs.version }}" > RELEASE_NOTES.md
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): prepare ${{ github.event.inputs.version }}" || true
          git tag -a "${{ github.event.inputs.version }}" -m "Release ${{ github.event.inputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: TIENSON SALEHUB ${{ github.event.inputs.version }}
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
