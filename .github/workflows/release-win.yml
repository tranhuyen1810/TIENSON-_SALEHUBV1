name: Release Windows EXE

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semantic version (example: v1.0.0)"
        required: true
      prerelease:
        description: "Publish as prerelease"
        required: true
        default: "false"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      RELEASE_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}
      RELEASE_PRERELEASE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.prerelease || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version format
        shell: bash
        run: |
          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Version must follow semantic versioning: vMajor.Minor.Patch"
            exit 1
          fi

      - name: Set package version
        shell: bash
        run: |
          VERSION_NO_V=$RELEASE_VERSION
          VERSION_NO_V=${VERSION_NO_V#v}
          node -e "const fs=require('fs'); const version=process.argv[1]; for (const file of ['package.json','package-lock.json']) { const json=JSON.parse(fs.readFileSync(file,'utf8')); json.version=version; if (file === 'package-lock.json' && json.packages?.['']) { json.packages[''].version=version; } fs.writeFileSync(file, JSON.stringify(json, null, 2) + '\n'); }" "$VERSION_NO_V"

      - name: Build and package
        run: npm run dist:win

      - name: Create release notes
        id: notes
        shell: bash
        run: |
          node scripts/release-notes.mjs "$RELEASE_VERSION" > RELEASE_NOTES.md
          echo "release_notes<<EOF" >> $GITHUB_OUTPUT
          cat RELEASE_NOTES.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create tag
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore(release): prepare $RELEASE_VERSION" || true
          git tag -a "$RELEASE_VERSION" -m "Release $RELEASE_VERSION"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: TIENSON SALEHUB ${{ env.RELEASE_VERSION }}
          body: ${{ steps.notes.outputs.release_notes }}
          draft: false
          prerelease: ${{ env.RELEASE_PRERELEASE == 'true' }}
          files: |
            release/*.exe
            release/*.yml
            release/*.blockmap
